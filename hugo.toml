baseURL = 'https://vxhamra.github.io/'
languageCode = 'en-us'
title = 'Between The Docs'
theme = 'PaperMod'

[pagination]
  pagerSize = 5

[params]
  env = 'production'
  description = "Virginia's personal blog"
  defaultTheme = 'auto'
  showReadingTime = true
  showShareButtons = true
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "Hey there 👋"
    Content = "Welcome to my blog — a space where I share thoughts, learnings, and experiences."

  [params.giscus]
    repo = "vxhamra/vxhamra.github.io"
    repoId = "R_kgDOSUIC2w"
    category = "Announcements"
    categoryId = "DIC_kwDOSUIC284C8U5m"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    lightTheme = "light"
    darkTheme = "dark_high_contrast"
    lang = "en"
    loading = "lazy"

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/vxhamra'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'archives'
    name = 'Archives'
    url = '/archives/'
    weight = 30
